---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 7
  - package-ecosystem: cargo
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
